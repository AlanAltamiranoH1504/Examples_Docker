version: "3" # Version del archivo compose 

services:
  mongo-db:
    container_name: ${MONGO_DB_NAME} # Nombre del contenedor
    image: mongo:6.0 # Imagen que usa el contenedor
    volumes:
      - pokemon-volume:/data/db # Crea volumen de docker y guarda la info (pokemon-volume)
    # ports:
    #   - ${LOCAL_PORT}:${CONTAINER_PORT}
    restart: always
    environment: # Variables de entorno de la conexion a la base
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    command: ["--auth"] # Comando ejecutable al ejecuctar contenedor

  mongo-express:
    container_name: mongo-express
    depends_on:
      - mongo-db
    image: mongo-express:1.0.0-alpha.4
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD}
      - ME_CONFIG_MONGODB_SERVER=${MONGO_DB_NAME}
    ports:
      - 8081:8081
    restart: always

  pokemon-app:
    container_name: pokemon-app
    depends_on:
      - mongo-db
      - mongo-express
    image: klerith/pokemon-nest-app:1.0.0
    environment:
      - MONGODB=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_DB_NAME}:${CONTAINER_PORT}
      - DB_NAME=poke_db
    ports:
      - 3000:3000
    restart: always

volumes:
  pokemon-volume:
    external: false # No buscar volumen externo y crea uno nuevo 
  
    
    